services:
  service:
    image: "${APP_IMAGE}:${PHP_VERSION}-fpm"
    build:
      context: ../.
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION}
        COMPOSER_VERSION: ${COMPOSER_VERSION}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      TZ: Asia/Taipei
    volumes:
      # 專案原始碼（與 Nginx 共用）
      - ../../.:/var/www/html:delegated
      # 將本地 PHP 設定掛到 FPM 的 conf.d
      - ../php/local.ini:/usr/local/etc/php/conf.d/99-local.ini:ro
      # 將 Xdebug 設定掛到 FPM 的 conf.d（非 CLI 路徑）
      - ../php/docker-php-ext-xdebug.ini:/usr/local/etc/php/conf.d/20-xdebug.ini:ro
    # PHP-FPM 不對外開埠，由 Nginx 代理
    working_dir: /var/www/html
    networks:
      - web-network

  nginx:
    image: nginx:alpine
    container_name: ${NGINX_NAME}
    ports:
      - "${APP_PORT:-8091}:80"
    volumes:
      - ../../.:/var/www/html:ro
      - ../nginx/laravel.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - service
    networks:
      - web-network

networks:
  web-network:
    name: ${NETWORK_NAME}
    external: true