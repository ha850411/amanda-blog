services:
  db:
    image: mysql:latest
    container_name: amanda-blog-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      TZ: Asia/Taipei
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./custom.cnf:/etc/mysql/conf.d/custom.cnf:ro
    command:
      - --sql-mode=STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    restart: always
    networks:
      - db-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  phpmyadmin:
    image: arm64v8/phpmyadmin
    container_name: amanda-blog-phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: "1"
    ports:
      - "${PMA_PORT}:80"
    networks:
      - db-network
    depends_on:
      - db

  redis:
    image: redis:latest
    container_name: amanda-blog-redis
    command: redis-server --appendonly yes --save 60 1000
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    networks:
      - db-network
    restart: always

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  db-network:
    name: ${NETWORK_NAME}
    ipam:
      config:
        - subnet: ${NETWORK_SUBNET}
          gateway: ${NETWORK_GATEWAY}